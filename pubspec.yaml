name: ai_caption_generator
description: AI Caption Generator - Hashtags & Bio for Social Media
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  google_sign_in: ^6.2.1

  # HTTP for Gemini API
  http: ^1.2.1

  # AdMob
  google_mobile_ads: ^5.1.0

  # UI & UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

  # Utilities
  shared_preferences: ^2.2.3
  clipboard: ^0.1.3
  share_plus: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
